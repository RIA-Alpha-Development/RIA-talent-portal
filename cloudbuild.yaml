# Cloud Build configuration for RIA Talent Portal
# Matches simplevisor.ai deployment pattern

# Timeout for the entire build pipeline
timeout: '3600s'  # 60 minutes total

steps:
  # Build the Docker image with caching for faster builds
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ria-talent-portal'
      - '--cache-from'
      - 'gcr.io/$PROJECT_ID/ria-talent-portal:latest'
      - '--target'
      - 'production'
      - '-f'
      - 'frontend/Dockerfile'
      - 'frontend'

  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ria-talent-portal']

  # Deploy to Cloud Run with Cloud SQL connection
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ria-talent-portal'
      - '--image=gcr.io/$PROJECT_ID/ria-talent-portal'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=10'
      - '--min-instances=0'
      - '--concurrency=80'
      - '--timeout=300s'
      - '--add-cloudsql-instances=${_INSTANCE_CONNECTION_NAME}'
      - '--update-env-vars=NODE_ENV=production,DB_NAME=ria_ats,DB_USER=postgres,INSTANCE_CONNECTION_NAME=${_INSTANCE_CONNECTION_NAME},GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1'
      - '--update-secrets=DB_PASSWORD=ria-db-password:latest,JWT_SECRET=ria-jwt-secret:latest'
      - '--no-traffic'

  # Switch 100% traffic to the new revision (blue-green deployment)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update-traffic'
      - 'ria-talent-portal'
      - '--to-latest'
      - '--region=us-central1'

# Substitution variables - override these when running the build
substitutions:
  _INSTANCE_CONNECTION_NAME: 'simplevisormvp:us-central1:ria-talent-db'

# Store the built image
images:
  - 'gcr.io/$PROJECT_ID/ria-talent-portal'

# Use high-CPU machine for faster builds
options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
